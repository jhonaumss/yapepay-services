name: cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  # Matches ServicesStack in yapepay-infra (infrastructure/yapepay-infra).
  ECS_CLUSTER: yapepay-dev-cluster

permissions:
  contents: read

jobs:
  # ── Tests (all Node services, runs on PR and push) ──────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, wallet-service, transaction-service, qr-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Build ssdk
        run: |
          cd ssdk
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test

  test-credit-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd credit-service
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd credit-service
          pytest tests -v

  # ── ECS Fargate: user / wallet / transaction / credit ───────────────────────
  fargate:
    needs: [test, test-credit-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            ecr_repo: yapepay-dev-user-service
            ecs_service: yapepay-dev-user-service
            dockerfile: user-service/Dockerfile
          - service: wallet-service
            ecr_repo: yapepay-dev-wallet-service
            ecs_service: yapepay-dev-wallet-service
            dockerfile: wallet-service/Dockerfile
          - service: transaction-service
            ecr_repo: yapepay-dev-transaction-service
            ecs_service: yapepay-dev-transaction-service
            dockerfile: transaction-service/Dockerfile
          - service: credit-service
            ecr_repo: yapepay-dev-credit-service
            ecs_service: yapepay-dev-credit-service
            dockerfile: credit-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t $REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG \
            -t $REGISTRY/${{ matrix.ecr_repo }}:latest \
            .
          docker push $REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG
          docker push $REGISTRY/${{ matrix.ecr_repo }}:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ matrix.ecs_service }} \
            --desired-count 1 \
            --force-new-deployment \
            --no-cli-pager

  # ── Lambda: qr-service / notification-service ───────────────────────────────
  lambda:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: qr-service
            function_name: yapepay-dev-qr-handler
          - service: notification-service
            function_name: yapepay-dev-notification-handler

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build ssdk
        run: |
          cd ssdk
          npm ci
          npm run build

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Package Lambda zip
        run: |
          mkdir -p /tmp/lambda-pkg
          # Flatten dist/ to root so handler path is: lambda.handler → lambda.js
          cp -r ${{ matrix.service }}/dist/. /tmp/lambda-pkg/
          cp -r ${{ matrix.service }}/node_modules /tmp/lambda-pkg/node_modules
          cd /tmp/lambda-pkg
          zip -r /tmp/${{ matrix.service }}.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function_name }} \
            --zip-file fileb:///tmp/${{ matrix.service }}.zip \
            --no-cli-pager
